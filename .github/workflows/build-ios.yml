name: Build Safari iOS Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Xcode Version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Install Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install Dependencies and Build Web Project
      run: |
        bun install
        bun run build

    - name: Convert Compiled Extension to Safari
      run: |
        TARGET_DIR="."
        if [ -d ".output/chrome-mv3" ]; then
          TARGET_DIR=".output/chrome-mv3"
        elif [ -d "dist" ]; then
          TARGET_DIR="dist"
        fi
        
        xcrun safari-web-extension-converter "$TARGET_DIR" \
          --ios-only \
          --no-open \
          --project-location ./OutputProject \
          --app-name "SchooltapeSafari"

    - name: Build and Archive Project
      run: |
        cd OutputProject/SchooltapeSafari
        
        # Added GCC_TREAT_WARNINGS_AS_ERRORS=NO and COMPILER_INDEX_STORE_ENABLE=NO to bypass code 65
        xcodebuild archive \
          -project SchooltapeSafari.xcodeproj \
          -scheme "SchooltapeSafari (iOS)" \
          -archivePath build/SchooltapeSafari.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          GCC_TREAT_WARNINGS_AS_ERRORS=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Package Bundle into IPA
      run: |
        cd OutputProject/SchooltapeSafari
        mkdir -p build/Payload
        cp -r build/SchooltapeSafari.xcarchive/Products/Applications/SchooltapeSafari.app build/Payload/
        cd build
        zip -r SchooltapeSafari.ipa Payload

    - name: Upload Unsigned IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Schooltape-Unsigned-IPA
        path: OutputProject/SchooltapeSafari/build/SchooltapeSafari.ipa
