name: Build Safari iOS Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Xcode Version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'

    - name: Install Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install Dependencies
      run: bun install

    - name: Compile Extension Code
      run: bun run build

    - name: Debug Output Folders
      run: |
        echo "=== Checking Output Directories ==="
        ls -la
        if [ -d ".output" ]; then
          echo "=== Inside .output ==="
          ls -la .output
        fi
        if [ -d "dist" ]; then
          echo "=== Inside dist ==="
          ls -la dist
        fi

    - name: Convert Compiled Output to Safari Project
      run: |
        # Locate the exact directory holding manifest.json dynamically
        TARGET_DIR=""
        if [ -f ".output/chrome-mv3/manifest.json" ]; then
          TARGET_DIR=".output/chrome-mv3"
        elif [ -f ".output/safari/manifest.json" ]; then
          TARGET_DIR=".output/safari"
        elif [ -f "dist/manifest.json" ]; then
          TARGET_DIR="dist"
        else
          # Fallback search for any built folder containing a manifest file
          TARGET_DIR=$(find . -name "manifest.json" -not -path "*/node_modules/*" -not -path "./OutputProject/*" | head -n 1 | xargs dirname)
        fi
        
        echo "Target extension folder located at: $TARGET_DIR"
        
        if [ -z "$TARGET_DIR" ] || [ "$TARGET_DIR" = "." ]; then
          echo "Error: Could not locate compiled extension build files. Using root folder fallback."
          TARGET_DIR="."
        fi

        xcrun safari-web-extension-converter "$TARGET_DIR" \
          --ios-only \
          --no-open \
          --force \
          --project-location ./OutputProject \
          --app-name "SchooltapeSafari"

    - name: Build and Archive Project
      run: |
        cd OutputProject/SchooltapeSafari
        
        xcodebuild archive \
          -project SchooltapeSafari.xcodeproj \
          -scheme "SchooltapeSafari (iOS)" \
          -archivePath build/SchooltapeSafari.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE_SPECIFIER="" \
          GCC_TREAT_WARNINGS_AS_ERRORS=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Package Bundle into IPA
      run: |
        cd OutputProject/SchooltapeSafari
        mkdir -p build/Payload
        cp -r build/SchooltapeSafari.xcarchive/Products/Applications/*.app build/Payload/
        cd build
        zip -r SchooltapeSafari.ipa Payload

    - name: Upload Unsigned IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Schooltape-Unsigned-IPA
        path: OutputProject/SchooltapeSafari/build/SchooltapeSafari.ipa
